# FIX 4.4 session config for Delta One's initiator, connecting to sim's
# acceptor (sim/CLAUDE.md, acceptor.cfg in crates/sim/). Loaded via
# quickfix::SessionSettings::try_from_path (ADR-003).
#
# ponytail: UseDataDictionary=N -- no spec-driven field validation. Both ends
# of this session are ours (d1-gateway-fix <-> sim), and convert.rs is the
# actual correctness boundary (unit-tested), not the FIX engine's XML spec
# check. Turn this on (with a DataDictionary path) if a real venue needs it.
#
# ResetOnLogon=Y -- every session starts clean at seq=1 on both sides.
# Correct for this ephemeral sim-only demo session (no continuity across
# restarts to preserve); a real venue session would typically want N.
[DEFAULT]
ConnectionType=initiator
ReconnectInterval=5
HeartBtInt=30
UseDataDictionary=N
ResetOnLogon=Y
StartTime=00:00:00
EndTime=23:59:59

[SESSION]
BeginString=FIX.4.4
SenderCompID=D1
TargetCompID=SIM
SocketConnectHost=127.0.0.1
SocketConnectPort=5001
