# Always-on schema-compat job (ADR-007): proto append-only lint + Avro
# BACKWARD compatibility, regardless of which paths changed — a schema
# consumed by all three components must be checked even when the diff
# lands in one component's own directory (e.g. a Rust change that assumes
# a new proto field).
name: schema-compat

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Shallow checkout only has the PR's own ref; buf breaking's
      # `.git#branch=main` and the Avro baseline diff both need a real
      # local `main` branch to compare against. Skip on push-to-main,
      # where HEAD already *is* main (fetching into the checked-out
      # branch is rejected).
      - run: |
          if [ "$(git rev-parse --abbrev-ref HEAD)" != "main" ]; then
            git fetch --depth=1 origin main:refs/heads/main
          fi
      - uses: bufbuild/buf-setup-action@v1
      - run: docker compose -f deploy/docker-compose.yml up -d kafka schema-registry
      - run: ./scripts/schema-check.sh
