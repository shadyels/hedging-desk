# Per-component CI job (ADR-007), path-filtered to ui/ + shared protocol/.
# Gates match root CLAUDE.md: tsc --noEmit, eslint, vitest.
name: ui

on:
  push:
    branches: [main]
    paths: ["ui/**", "protocol/proto/**"]
  pull_request:
    paths: ["ui/**", "protocol/proto/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src
      - run: npm test -- --run
